<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>中韩同声传译系统</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
}

.start{background:#22c55e}
.stop{background:#ef4444}
.export{background:#3b82f6}

.subtitle{
background:#111827;
padding:20px;
border-radius:12px;
font-size:28px;
font-weight:bold;
line-height:1.6;
margin-top:20px;
height:220px;
overflow:auto;
}

.history{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:20px;
max-height:200px;
overflow:auto;
}

audio{
display:block;
margin-top:10px;
}

</style>
</head>

<body>

<h2>🎤 中韩同声传译系统</h2>

<button class="start" onclick="start()">开始</button>
<button class="stop" onclick="stop()">停止</button>
<button class="export" onclick="exportText()">导出字幕</button>

<div class="subtitle" id="subtitle"></div>

<h3>翻译历史</h3>
<div class="history" id="history"></div>

<h3>录音回放</h3>
<div id="audioList"></div>

<script>

let recognition
let recorder
let chunks=[]
let stream
let historyData=[]

const subtitle=document.getElementById("subtitle")
const historyBox=document.getElementById("history")

function start(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

recognition=new SpeechRecognition()

recognition.lang="ko-KR"
recognition.continuous=true

recognition.onresult=e=>{

let text=e.results[e.results.length-1][0].transcript

detectLanguage(text)

}

recognition.start()

startRecord()

}

function stop(){

if(recognition) recognition.stop()

if(recorder) recorder.stop()

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

}

function detectLanguage(text){

let korean=/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/

if(korean.test(text)){

translate(text,"ko","zh-CN")

}else{

translate(text,"zh-CN","ko")

}

}

function translate(text,sl,tl){

fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`)

.then(r=>r.json())

.then(d=>{

let t=d[0][0][0]

showSubtitle(text,t)

saveHistory(text,t)

})

}

function showSubtitle(src,res){

let html=`

<div>
${src}
<br>
<span style="color:#38bdf8">${res}</span>
</div>
<hr>
`

subtitle.innerHTML+=html

subtitle.scrollTop=subtitle.scrollHeight

}

function saveHistory(src,res){

let item={
time:new Date().toLocaleTimeString(),
src:src,
res:res
}

historyData.push(item)

localStorage.setItem("translator_history",JSON.stringify(historyData))

renderHistory()

}

function renderHistory(){

let data=JSON.parse(localStorage.getItem("translator_history")||"[]")

historyBox.innerHTML=""

data.forEach(i=>{

let div=document.createElement("div")

div.textContent=`${i.time}  ${i.src} → ${i.res}`

historyBox.appendChild(div)

})

}

function exportText(){

let data=JSON.parse(localStorage.getItem("translator_history")||"[]")

let text=""

data.forEach(i=>{

text+=`${i.time}  ${i.src} -> ${i.res}\n`

})

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

let date=new Date().toISOString().slice(0,10)

a.download=`translation_${date}.txt`

a.href=URL.createObjectURL(blob)

a.click()

}

async function startRecord(){

stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

recorder.ondataavailable=e=>{

chunks.push(e.data)

}

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"audio/mp4"})

let url=URL.createObjectURL(blob)

let audio=document.createElement("audio")

audio.controls=true

audio.src=url

let date=new Date().toLocaleString()

let label=document.createElement("div")

label.textContent="录音："+date

document.getElementById("audioList").appendChild(label)

document.getElementById("audioList").appendChild(audio)

chunks=[]

}

}

renderHistory()

</script>

</body>
</html>
