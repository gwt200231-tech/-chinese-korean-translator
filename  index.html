

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>中韩同声传译系统</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

button{
padding:12px 22px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.start{background:#22c55e}
.stop{background:#ef4444}
.export{background:#3b82f6}

.subtitle{
background:#111827;
padding:20px;
border-radius:12px;
font-size:26px;
font-weight:bold;
line-height:1.6;
margin-top:20px;
height:240px;
overflow:auto;
}

.history{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:20px;
max-height:200px;
overflow:auto;
}

audio{
display:block;
margin-top:10px;
}

</style>
</head>

<body>

<h2>🎤 中韩同声传译系统</h2>

<button class="start" onclick="start()">开始</button>
<button class="stop" onclick="stop()">停止</button>
<button class="export" onclick="exportText()">导出字幕</button>

<div class="subtitle" id="subtitle"></div>

<h3>翻译历史</h3>
<div class="history" id="history"></div>

<h3>录音回放</h3>
<div id="audioList"></div>

<script>

let recognition
let mediaRecorder
let audioChunks=[]
let audioStream

const subtitle=document.getElementById("subtitle")
const historyBox=document.getElementById("history")

// 开始
async function start(){

try{

// 获取麦克风权限
audioStream=await navigator.mediaDevices.getUserMedia({audio:true})

startRecording()

startSpeech()

}catch(e){

alert("麦克风权限被拒绝或设备不支持")

}

}

// 语音识别
function startSpeech(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("浏览器不支持语音识别")
return
}

recognition=new SpeechRecognition()

recognition.lang="ko-KR"
recognition.continuous=true
recognition.interimResults=false

recognition.onresult=e=>{

let text=e.results[e.results.length-1][0].transcript

detectLanguage(text)

}

recognition.onerror=e=>{
console.log("识别错误",e)
}

recognition.start()

}

// 停止
function stop(){

if(recognition){
recognition.stop()
}

if(mediaRecorder){
mediaRecorder.stop()
}

if(audioStream){
audioStream.getTracks().forEach(track=>track.stop())
}

}

// 自动检测语言
function detectLanguage(text){

let korean=/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/

if(korean.test(text)){
translate(text,"ko","zh-CN")
}else{
translate(text,"zh-CN","ko")
}

}

// 翻译
function translate(text,sl,tl){

fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`)

.then(res=>res.json())

.then(data=>{

let result=data[0][0][0]

showSubtitle(text,result)

saveHistory(text,result)

})

.catch(err=>{
console.log("翻译错误",err)
})

}

// 字幕
function showSubtitle(src,res){

let html=`

<div>
${src}
<br>
<span style="color:#38bdf8">${res}</span>
</div>
<hr>
`

subtitle.innerHTML+=html

subtitle.scrollTop=subtitle.scrollHeight

}

// 保存历史
function saveHistory(src,res){

let item={
time:new Date().toLocaleTimeString(),
src:src,
res:res
}

let data=JSON.parse(localStorage.getItem("translator_history")||"[]")

data.push(item)

localStorage.setItem("translator_history",JSON.stringify(data))

renderHistory()

}

// 渲染历史
function renderHistory(){

let data=JSON.parse(localStorage.getItem("translator_history")||"[]")

historyBox.innerHTML=""

data.forEach(i=>{

let div=document.createElement("div")

div.textContent=`${i.time}  ${i.src} → ${i.res}`

historyBox.appendChild(div)

})

}

// 导出字幕
function exportText(){

let data=JSON.parse(localStorage.getItem("translator_history")||"[]")

let text=""

data.forEach(i=>{
text+=`${i.time}  ${i.src} -> ${i.res}\n`
})

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="translation.txt"

a.click()

}

// 录音
function startRecording(){

try{

mediaRecorder=new MediaRecorder(audioStream)

mediaRecorder.start()

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data)
}

mediaRecorder.onstop=()=>{

let blob=new Blob(audioChunks,{type:"audio/webm"})

let url=URL.createObjectURL(blob)

let audio=document.createElement("audio")

audio.controls=true
audio.src=url

let label=document.createElement("div")
label.textContent="录音："+new Date().toLocaleString()

document.getElementById("audioList").appendChild(label)
document.getElementById("audioList").appendChild(audio)

audioChunks=[]

}

}catch(e){

console.log("录音功能不支持")

}

}

renderHistory()

</script>

</body>
</html>
